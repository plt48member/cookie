<html>
    <link rel="stylesheet" href="style.css">
    <head>
        <title>cookie clicker</title>
    </head>

    <body>
        <header>click the cookie to earn!</header>
        
        <main>
            <section id="cookies">
                <h2>Cookies:</h2>
                <p id="cookies"></p>
        </section>

        <section id="cookie-area">
                <button id="cookie">🍪</button>
        </section>

        <section id="shop">
            <h2>Shop</h2>

            <div class="upgrades">
                <h3>clicker</h3>
                <p>+1 cookie per click</p>
                <p>Cost: 10 Cookies</p>
                <button id="buy-cursor">Buy</button>
            </div>

            <div class="upgrade">
                <h3>Grandma</h3>
                <p>+1 Cookie Every Second</p>
                <p>Cost: 50 Cookies</p>
                <button id="buy-grandma">Buy</button>
            </div>

        </section>

        
        

    </main>

    <script src="/click"></script>

</body>
